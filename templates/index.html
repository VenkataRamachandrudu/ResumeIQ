<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeIQ</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div style="padding:20px 40px; font-size:22px; font-weight:800;">
  RESUME<span style="color:#7effa0;">IQ</span>
</div>

<div class="container">

<header>
  <div class="ai-badge">
    <span class="dot"></span>
    AI-POWERED • ML GRADED
  </div>

  <h1>Grade Your <span>Resume</span></h1>
  <p class="subtitle">Upload your resume and get instant ML grade</p>
</header>

<div class="main-layout">

  <div class="card">
    <div class="drop-zone">
      <input type="file" id="fileInput" accept=".pdf">
      <p>Drop your resume or click to upload</p>
    </div>

    <div class="file-pill" id="filePill">
      📎 <span id="fileName"></span>
    </div>

    <button class="btn" id="analyzeBtn" onclick="analyzeResume()" disabled>
      Analyze Resume →
    </button>
  </div>

  <!-- LAPTOP -->
  <div class="hero-laptop">

    <div class="laptop-screen">
      <img src="/static/sample_score.png" id="previewImage">
    </div>

    <img src="/static/macbook.png" class="laptop-frame">

  </div>

</div>

<!-- RESULT -->
<div class="card result hidden" id="resultCard">

  <div class="score-container">

    <div class="score-circle hidden" id="scoreCircle">
      <svg>
        <circle cx="60" cy="60" r="50"></circle>
        <circle cx="60" cy="60" r="50" id="progressCircle"></circle>
      </svg>
      <div class="score-text" id="scoreValue">--</div>
    </div>

    <div class="grade-block">
      <h2 id="gradeTitle">Grade: -</h2>
      <p id="gradeDesc">Waiting for upload...</p>
    </div>

  </div>

  <div class="suggestions hidden" id="suggestionsBox">
    <h3>Suggestions</h3>
    <ul id="suggestList"></ul>
  </div>

  <button class="btn-ghost" onclick="resetAll()">Analyze another resume</button>

</div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
